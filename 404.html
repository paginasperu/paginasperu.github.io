<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
      (function() {
        const links = {
            "whatsapp": "https://wa.me/51950141414",
            "instagram": "https://www.instagram.com/oficial.pe_",
            "tiktok": "https://www.tiktok.com/@oficial.pe_",
            "mapa": "https://maps.app.goo.gl/64j7gMR3SiLfdUu46"
        };

        const slug = decodeURIComponent(window.location.pathname.replace(/^\/+|\/+$/g, ""));
        
        // Si el slug existe en nuestra lista, redirigimos de inmediato
        if (slug && links[slug]) {
            window.location.replace(links[slug]);
            // Guardamos en una variable global que estamos redirigiendo para el CSS
            window.isRedirecting = true;
        }
      })();
    </script>

    <title>OFICIAL</title>
    <meta name="description" content="Enlace oficial de servicios y contacto.">
    <meta property="og:title" content="OFICIAL">
    <meta property="og:description" content="Haz clic para ir al enlace oficial.">
    <meta property="og:image" content="https://oficial.pe/images/brand/preview.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://oficial.pe">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23111111%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9F7;
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 600px; opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
        h1 { font-size: 2.2rem; font-weight: 300; margin-bottom: 20px; letter-spacing: -1px; }
        p { color: #666; margin-bottom: 40px; font-size: 1.1rem; }
        .cta-button {
            display: inline-block;
            text-decoration: none;
            color: #333;
            border: 1px solid #ccc;
            padding: 12px 30px;
            border-radius: 50px;
            transition: 0.2s;
        }
        .cta-button:hover { background: #111; color: #fff; border-color: #111; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Si estamos redirigiendo, ocultamos el mensaje de error por defecto */
        .is-error { display: block; }
        .is-redirecting { display: none; }
    </style>
</head>
<body>

    <main id="redirect-ui" class="container" style="display: none;">
        <h1>Conectando...</h1>
        <p>Te estamos llevando al enlace oficial de OFICIAL.PE</p>
    </main>

    <main id="error-ui" class="container">
        <span style="color:#999; font-weight:500; font-size:0.9rem; display:block; margin-bottom:10px;">ERROR 404</span>
        <h1>Enlace no válido</h1>
        <p>Esta dirección no existe o ya no está disponible.</p>
        <a href="https://oficial.pe" class="cta-button">Ir a la web principal</a>
    </main>

    <script>
        // Si el script inicial detectó un slug válido, cambiamos la UI
        if (window.isRedirecting) {
            document.getElementById('error-ui').style.display = 'none';
            document.getElementById('redirect-ui').style.display = 'block';
        }
    </script>
</body>
</html>
