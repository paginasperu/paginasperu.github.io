<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test CORS - Expreso</title>
    <style>
        body { background: #000; color: #eee; font-family: monospace; padding: 40px; }
        #resultado { margin-top: 20px; padding: 20px; background: #111; border-radius: 8px; word-break: break-all; }
        button { background: #fff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-size: 1rem; border-radius: 4px; }
    </style>
</head>
<body>

<h2>Test CORS — Expreso.com.pe</h2>
<button onclick="testFetch()">Ejecutar fetch</button>
<div id="resultado">Esperando...</div>

<script>
function testFetch() {
    const resultado = document.getElementById('resultado');
    resultado.textContent = 'Cargando...';

    fetch("https://www.expreso.com.pe")
        .then(res => res.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const img = doc.querySelector('img[alt="Diario expreso - Portada del día"]');
            if (img) {
                const url = img.getAttribute("data-src");
                resultado.innerHTML = url
                    ? `<span style="color:#0f0">[OK] URL encontrada:</span><br><br>${url}<br><br><img src="${url}" style="max-width:300px;margin-top:10px;">`
                    : `<span style="color:#f90">[!] Imagen encontrada pero sin data-src</span>`;
            } else {
                resultado.innerHTML = `<span style="color:#f90">[!] No se encontró img con ese alt</span>`;
            }
        })
        .catch(err => {
            resultado.innerHTML = `<span style="color:#f00">[ERROR CORS] ${err}</span>`;
        });
}
</script>

</body>
</html>
