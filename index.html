<!DOCTYPE html>
<html lang="es">
<body>
    <h3>Expreso: Portada del día</h3>
    <button onclick="scrap()">Obtener URL</button>
    <p id="out"></p>

    <script>
        async function scrap() {
            const out = document.getElementById('out');
            out.innerText = "Buscando...";
            
            try {
                // El proxy permite saltar el CORS
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.expreso.com.pe')}`);
                const data = await response = await res.json();
                const doc = new DOMParser().parseFromString(data.contents, 'text/html');

                // Selector flexible para encontrar la portada
                const img = Array.from(doc.querySelectorAll('img')).find(i => 
                    i.alt.includes("Portada") || i.dataset.src?.includes("portada")
                );

                if (img) {
                    const src = img.getAttribute('data-src') || img.src;
                    out.innerHTML = `URL: ${src}<br><img src="${src}" width="300">`;
                } else {
                    out.innerText = "No se halló la imagen.";
                }
            } catch (e) {
                out.innerText = "Error de conexión.";
            }
        }
    </script>
</body>
</html>
