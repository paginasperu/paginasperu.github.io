<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICIAL.PE | Portadas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
    <style>
        :root { --bg: #050505; --text: #eee; --dim: #666; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
        header { padding: 20px; position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid #151515; z-index: 1000; }
        .header-content { max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 0.9rem; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        .nav-link { font-size: 0.65rem; color: var(--dim); text-decoration: none; letter-spacing: 2px; border: 1px solid #222; padding: 7px 15px; border-radius: 4px; transition: 0.3s; }
        .nav-link:hover { background: #fff; color: #000; }
        .container { max-width: 600px; margin: 0 auto; padding: 30px 20px; }
        .card { margin-bottom: 60px; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-title { font-size: 0.8rem; color: var(--dim); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; font-weight: 600; }
        /* Contenedor flexible para portadas de cualquier altura */
        .img-container { width: 100%; background: #111; border-radius: 8px; overflow: hidden; position: relative; min-height: 200px; }
        img { width: 100%; height: auto; display: block; opacity: 0; transition: opacity 1s; }
        img.loaded { opacity: 1; }
        footer { text-align: center; padding: 40px; opacity: 0.4; font-size: 0.6rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>OFICIAL.PE</h1>
            <a href="https://wa.me/51950141414" class="nav-link" target="_blank">WHATSAPP</a>
        </div>
    </header>
    <div class="container" id="gallery"></div>
    <footer>© 2026 OFICIAL.PE | SIMPLICIDAD Y ELEGANCIA</footer>

    <script>
        const CSV_URL = 'data/portadas.csv';
        function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) { render(results.data); }
            });
        }
        function render(data) {
            const gallery = document.getElementById('gallery');
            const v = new Date().getTime();
            data.forEach((row) => {
                if (row.Diario && row.Imagen) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-title">${row.Diario}</div>
                        <div class="img-container">
                            <img src="${row.Imagen}?v=${v}" alt="${row.Diario}" onload="this.classList.add('loaded')">
                        </div>`;
                    gallery.appendChild(card);
                }
            });
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
