<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICIAL.PE | Portadas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
    <style>
        :root { --bg: #000; --shimmer: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        header { 
            padding: 15px 20px; 
            position: sticky; 
            top: 0; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            z-index: 1000; 
            border-bottom: 1px solid #1a1a1a; 
        }
        .header-content {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { 
            font-size: 0.85rem; 
            font-weight: 300; 
            letter-spacing: 4px; 
            margin: 0; 
            color: #fff; 
            text-transform: uppercase;
        }
        .nav-link {
            font-size: 0.65rem;
            color: #777;
            text-decoration: none;
            letter-spacing: 2px;
            border: 1px solid #222;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .nav-link:active { background: #fff; color: #000; border-color: #fff; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px 20px 60px; }

        .card { margin-bottom: 45px; }
        .card-title { font-size: 0.75rem; color: #555; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        .img-container { 
            width: 100%; 
            aspect-ratio: 3 / 4; 
            background: var(--shimmer); 
            position: relative; 
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .shimmer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02), transparent);
            animation: loading 1.8s infinite linear;
            z-index: 1;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        img { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity;
            z-index: 2;
        }
        img.loaded { opacity: 1; }

        footer { text-align: center; padding: 40px 20px; border-top: 1px solid #111; }
        footer p { font-size: 0.6rem; color: #333; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <h1>OFICIAL.PE</h1>
        <a href="https://wa.me/51950141414" class="nav-link" target="_blank">CONTACTO</a>
    </div>
</header>

<div class="container" id="gallery">
    </div>

<footer>
    <p>© 2026 OFICIAL.PE | AGENCIA DE VALIDACIÓN DIGITAL</p>
</footer>

<script>
    const CSV_URL = 'data/Datos - Portadas.csv';

    function init() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const gallery = document.getElementById('gallery');
                const v = new Date().getTime();

                results.data.forEach((row, index) => {
                    if (row.Diario && row.Imagen) {
                        const isEager = index < 2 ? 'eager' : 'lazy';
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-title">${row.Diario}</div>
                            <div class="img-container">
                                <div class="shimmer"></div>
                                <img src="${row.Imagen}?v=${v}" 
                                     alt="Portada de ${row.Diario}" 
                                     loading="${isEager}"
                                     onload="this.classList.add('loaded'); if(this.previousElementSibling) this.previousElementSibling.remove();"
                                     onerror="this.style.display='none';">
                            </div>
                        `;
                        gallery.appendChild(card);
                    }
                });
            }
        });
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
