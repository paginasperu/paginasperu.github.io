name: Actualizar Portadas Oficial.pe

on:
  schedule:
    # Se ejecuta a las 6:00 AM y 9:00 AM hora Perú (11:00 y 14:00 UTC)
    - cron: '0 11,14 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Detectará el requirements.txt automáticamente

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar motor de portadas
        run: python scripts/portadas.py

      - name: Configurar Git y Subir Cambios
        run: |
          git config --global user.name "OficialBot"
          git config --global user.email "bot@oficial.pe"
          
          git add data/DATOS.csv || true
          git add img/portadas/*.jpg || true
          
          git pull --rebase origin main || true
          
          if git diff --staged --quiet; then
            echo "Sin cambios detectados."
          else
            git commit -m "Auto-update: Portadas $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
