name: Actualizar Portadas

on:
  schedule:
    # 11:00 UTC es exactamente 06:00 AM en Lima, Perú (Fijo todo el año)
    - cron: '0 11 * * *'
  workflow_dispatch: # Botón para ejecución manual en la pestaña Actions

permissions:
  contents: write # Crucial para que la Action pueda guardar fotos y el CSV

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests Pillow

      - name: Ejecutar motor de portadas
        run: python scripts/portadas.py

      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/portadas/* data/portadas.csv
          # Si no hay cambios, no hace nada. Si hay, hace commit con fecha.
          git diff --staged --quiet || (git commit -m "Automatización: Portadas actualizadas $(date +'%Y-%m-%d')" && git push)
