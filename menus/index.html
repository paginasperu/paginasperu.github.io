<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENÚS | OFICIAL.PE</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
    
    <style>
        :root { --bg: #fcfcfc; --header: #000; --text: #222; --muted: #777; --border: #eee; --wa: #128C7E; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }

        /* CABECERA */
        header { padding: 20px 0; background: var(--header); }
        .nav-container { display: flex; justify-content: center; gap: 30px; }
        .pill { font-size: 0.7rem; color: #888; text-decoration: none; letter-spacing: 2px; padding: 8px 0; text-transform: uppercase; font-weight: 600; border-bottom: 2px solid transparent; transition: 0.3s; }
        .pill.active { color: #fff; border-bottom: 2px solid #fff; }

        /* FILTROS CON SCROLL HORIZONTAL */
        .filter-zone { background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .filter-bar { 
            display: flex; gap: 10px; padding: 12px 20px; 
            overflow-x: auto; white-space: nowrap; scrollbar-width: none;
            justify-content: flex-start; max-width: 1200px; margin: 0 auto;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        @media (min-width: 800px) { .filter-bar { justify-content: center; } }

        select { padding: 10px 16px; border: 1px solid #ddd; border-radius: 25px; font-size: 0.85rem; color: #444; background: #fff; cursor: pointer; outline: none; }

        /* GALERÍA */
        #gallery { padding: 20px; max-width: 1100px; margin: 0 auto; column-count: 1; column-gap: 20px; opacity: 0; transition: opacity 0.5s; }
        @media (min-width: 600px) { #gallery { column-count: 2; } }
        @media (min-width: 1100px) { #gallery { column-count: 3; } }

        /* CARDS */
        .card { break-inside: avoid; margin-bottom: 25px; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
        
        /* Solo la imagen tiene el cursor de zoom */
        .card img { width: 100%; display: block; cursor: zoom-in; transition: opacity 0.2s; }
        .card img:hover { opacity: 0.95; }
        
        .info { padding: 20px; }
        .info .category { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.8px; margin-bottom: 4px; }
        .info h3 { font-size: 1.1rem; font-weight: 600; color: #111; margin-bottom: 4px; }
        .info .details { font-size: 0.8rem; color: #666; margin-bottom: 15px; line-height: 1.4; }
        
        .footer-card { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #f5f5f5; }
        .price { font-size: 1.2rem; font-weight: 600; color: #000; }
        
        .wa-btn { 
            display: flex; align-items: center; gap: 6px; 
            text-decoration: none; color: var(--wa); font-size: 0.75rem; 
            font-weight: 600; padding: 6px 14px; border: 1px solid var(--wa);
            border-radius: 20px; transition: 0.2s;
        }
        .wa-btn::before { content: ""; width: 8px; height: 8px; background: #25D366; border-radius: 50%; }
        .wa-btn:active { background: #e8f5f3; transform: scale(0.96); }

        /* MODAL CON ANIMACIÓN SUAVE */
        #modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; cursor: zoom-out;
            opacity: 0; visibility: hidden; transition: 0.2s ease;
            display: flex; justify-content: center; align-items: center;
        }
        #modal img { max-width: 95%; max-height: 92vh; border-radius: 4px; transform: scale(0.95); transition: 0.2s ease; }
        #modal.active { opacity: 1; visibility: visible; }
        #modal.active img { transform: scale(1); }

        footer { padding: 80px 0; text-align: center; }
        .contact-link { color: var(--muted); text-decoration: none; font-size: 0.7rem; letter-spacing: 3px; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="../" class="pill">PORTADAS</a>
            <a href="#" class="pill active">MENÚS</a>
        </nav>
    </header>

    <div class="filter-zone">
        <div class="filter-bar">
            <select id="f-distrito"><option value="">Distrito</option></select>
            <select id="f-tipo"><option value="">Tipo</option></select>
            <select id="f-categoria"><option value="">Categoría</option></select>
            <select id="f-orden">
                <option value="default">Recientes</option>
                <option value="asc">Precio Menor</option>
                <option value="desc">Precio Mayor</option>
            </select>
        </div>
    </div>

    <div id="gallery"></div>

    <div id="modal" onclick="this.classList.remove('active')">
        <img src="" alt="Zoom">
    </div>

    <footer>
        <a href="https://wa.me/51950141414" target="_blank" rel="noopener" class="contact-link">CONTACTO</a>
    </footer>

    <script>
        // Ruta local para máxima velocidad, consistente con portadas.csv
        const CSV_URL = '../data/menus.csv';
        let masterData = [];

        function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: (r) => {
                    masterData = r.data;
                    setupFilters();
                    render();
                    document.getElementById('gallery').style.opacity = '1';
                },
                error: (err) => console.error("Error cargando CSV local:", err)
            });
        }

        function setupFilters() {
            const getU = (col) => [...new Set(masterData.map(i => i[col]))].filter(Boolean).sort();
            getU('Distrito').forEach(d => document.getElementById('f-distrito').add(new Option(d, d)));
            getU('Tipo').forEach(t => document.getElementById('f-tipo').add(new Option(t, t)));
            getU('Categoría').forEach(c => document.getElementById('f-categoria').add(new Option(c, c)));
        }

        function render() {
            const dV = document.getElementById('f-distrito').value;
            const tV = document.getElementById('f-tipo').value;
            const cV = document.getElementById('f-categoria').value;
            const oV = document.getElementById('f-orden').value;

            let data = masterData.filter(i => (!dV || i.Distrito === dV) && (!tV || i.Tipo === tV) && (!cV || i.Categoría === cV));
            
            if (oV === 'asc') data.sort((a,b) => (parseFloat(a['Precio menú completo'])||0) - (parseFloat(b['Precio menú completo'])||0));
            if (oV === 'desc') data.sort((a,b) => (parseFloat(b['Precio menú completo'])||0) - (parseFloat(a['Precio menú completo'])||0));

            const g = document.getElementById('gallery');
            g.innerHTML = '';
            
            // Cache por día para las imágenes
            const version = new Date().toISOString().slice(0,10); 

            data.forEach((row, index) => {
                if (!row.Imagen) return;
                
                // Blindaje para datos vacíos
                const phone = (row.WhatsApp || '').replace(/\s/g, '');
                const card = document.createElement('div');
                card.className = 'card';
                const imgSrc = `../images/menus/${row.Imagen}.jpg?v=${version}`;
                
                // Estructura limpia: el onclick de zoom va SOLO en la img
                card.innerHTML = `
                    <img src="${imgSrc}" 
                         loading="${index < 4 ? 'eager' : 'lazy'}" 
                         onclick="openZoom('${imgSrc}')" 
                         alt="${row.Restaurante}">
                    <div class="info">
                        <div class="category">${row.Categoría}</div>
                        <h3>${row.Restaurante}</h3>
                        <div class="details">
                            ${row.Tipo} • ${row.Distrito}<br>
                            ${row.Dirección}<br>
                            Delivery: ${row.Delivery || 'Consultar'}
                        </div>
                        <div class="footer-card">
                            <div class="price">S/ ${(parseFloat(row['Precio menú completo'])||0).toFixed(2)}</div>
                            <a href="https://wa.me/51${phone}" target="_blank" rel="noopener" class="wa-btn">
                                WhatsApp
                            </a>
                        </div>
                    </div>
                `;
                g.appendChild(card);
            });
        }

        function openZoom(src) {
            const modal = document.getElementById('modal');
            modal.querySelector('img').src = src;
            modal.classList.add('active');
        }

        document.querySelectorAll('select').forEach(s => s.onchange = render);
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
