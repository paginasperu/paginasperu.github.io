
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENÚS | OFICIAL.PE</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">

    <style>
        :root { --bg: #000; --text: #fff; --gray: #bbb; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; }
        
        /* HEADER: Estático y minimalista (Como portadas) */
        header { padding: 40px 20px 20px; text-align: center; background: var(--bg); }
        .nav-container { display: flex; justify-content: center; gap: 25px; }
        .pill { color: var(--gray); text-decoration: none; font-size: 0.85rem; font-weight: 600; padding-bottom: 6px; border-bottom: 2px solid transparent; transition: 0.3s; }
        .pill.active { color: #fff; border-bottom-color: #fff; }

        /* CONTROLES */
        .controls { padding: 15px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #111; scrollbar-width: none; }
        .controls::-webkit-scrollbar { display: none; }
        select { background: #000; color: #fff; border: 1px solid #222; padding: 10px; border-radius: 5px; font-size: 0.8rem; outline: none; cursor: pointer; }

        /* GALERÍA */
        #gallery { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 768px) { #gallery { grid-template-columns: repeat(3, 1fr); } }

        /* CARD */
        .card { background: #000; border: 1px solid #111; border-radius: 8px; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; cursor: pointer; display: block; opacity: 0; transition: opacity 0.4s; }
        .card img.loaded { opacity: 1; }
        
        .info { padding: 18px; }
        .info h3 { font-size: 1rem; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .info .price { font-size: 1.3rem; font-weight: 800; margin: 12px 0; color: #fff; }
        .info .meta { font-size: 0.75rem; color: #666; line-height: 1.6; }

        /* BOTÓN WHATSAPP (Blanco/Negro minimalista) */
        .btn-wa { display: block; margin-top: 15px; background: #fff; color: #000; padding: 12px; border-radius: 4px; text-decoration: none; font-weight: 800; font-size: 0.8rem; text-align: center; transition: 0.2s; }
        .btn-wa:hover { opacity: 0.9; }

        /* ZOOM (Lógica Portadas) */
        #gallery.zoomed { grid-template-columns: 1fr !important; padding: 10px; }
        #gallery.zoomed .card { border: none; }
        #gallery.zoomed img { aspect-ratio: auto; object-fit: contain; max-height: 95vh; border-radius: 0; }
        #gallery.zoomed .info { display: none; }

        footer { padding: 60px; text-align: center; border-top: 1px solid #111; font-size: 0.7rem; letter-spacing: 3px; color: #333; }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="../" class="pill">PORTADAS</a>
            <a href="#" class="pill active">MENÚS</a>
        </nav>
    </header>

    

    <div class="controls">
        <select id="f-distrito"><option value="">Distritos</option></select>
        <select id="f-tipo"><option value="">Tipos</option></select>
        <select id="f-categoria"><option value="">Categorías</option></select>
        <select id="f-orden">
            <option value="default">Recientes</option>
            <option value="asc">Precio: Menor a mayor</option>
            <option value="desc">Precio: Mayor a menor</option>
            <option value="az">Nombre: A-Z</option>
        </select>
    </div>

    <div id="gallery"></div>

    <footer>OFICIAL.PE • LIMA PERÚ</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9Z2C4BVz2pf5BzTj1pAtYBJydtyDgOd7itl9pF12cflFUXR26VaYxAPHARMjupx6t1g3brjMZZPhz/pub?gid=2057424831&single=true&output=csv';
        let menusMaster = [];

        const gallery = document.getElementById('gallery');
        gallery.onclick = () => gallery.classList.toggle('zoomed');

        async function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: (r) => {
                    menusMaster = r.data;
                    const getU = (c) => [...new Set(menusMaster.map(i => i[c]))].filter(Boolean).sort();
                    
                    // Llenado de filtros dinámicos
                    getU('Distrito').forEach(d => document.getElementById('f-distrito').add(new Option(d, d)));
                    getU('Tipo').forEach(t => document.getElementById('f-tipo').add(new Option(t, t)));
                    getU('Categoría').forEach(c => document.getElementById('f-categoria').add(new Option(c, c)));
                    
                    render();
                }
            });
        }

        function render() {
            const dV = document.getElementById('f-distrito').value;
            const tV = document.getElementById('f-tipo').value;
            const cV = document.getElementById('f-categoria').value;
            const oV = document.getElementById('f-orden').value;

            let data = menusMaster.filter(i => 
                (!dV || i.Distrito === dV) && 
                (!tV || i.Tipo === tV) && 
                (!cV || i.Categoría === cV)
            );

            // Ordenación Matemática
            if (oV === 'asc') data.sort((a,b) => (parseFloat(a['Precio menú completo'])||0) - (parseFloat(b['Precio menú completo'])||0));
            if (oV === 'desc') data.sort((a,b) => (parseFloat(b['Precio menú completo'])||0) - (parseFloat(a['Precio menú completo'])||0));
            if (oV === 'az') data.sort((a,b) => a.Restaurante.localeCompare(b.Restaurante));

            gallery.innerHTML = '';
            const v = new Date().getHours(); // Cache busting cada hora

            data.forEach((row, index) => {
                if (!row.Imagen) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                
                // Optimización: eager para los primeros 3 (ChatGPT hint)
                const loadingType = index < 3 ? 'eager' : 'lazy';
                
                card.innerHTML = `
                    <img loading="${loadingType}" 
                         src="../images/menus/${row.Imagen}.jpg?v=${v}" 
                         alt="Menú ${row.Tipo} de ${row.Restaurante}"
                         onload="this.classList.add('loaded')">
                    <div class="info">
                        <h3>${row.Restaurante}</h3>
                        <p style="color:#666; font-size:0.75rem; text-transform:uppercase">${row.Tipo} • ${row.Distrito}</p>
                        <div class="price">S/ ${(parseFloat(row['Precio menú completo'])||0).toFixed(2)}</div>
                        <div class="meta">
                            <span>📍 ${row.Dirección}</span><br>
                            <span>🛵 Delivery: ${row.Delivery || 'Consultar'}</span><br>
                            <span>🍴 ${row.Categoría}</span>
                        </div>
                        <a href="https://wa.me/51${row.WhatsApp.replace(/\s/g,'')}" 
                           target="_blank" 
                           class="btn-wa" 
                           onclick="event.stopPropagation()">PEDIR AHORA</a>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // Eventos de control
        document.querySelectorAll('select').forEach(s => {
            s.onclick = (e) => e.stopPropagation();
            s.onchange = render;
        });

        init();
    </script>
</body>
</html>
